[toolchain]
anchor_version = "0.31.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
sss_core = "CoREe6ZkRj5QFA96vYWPqtEfbL1Cnjr1b1BsEymuAt3x"
sss_transfer_hook = "HooKDQzbbLdNExNAH4FowynGaEwtnYP6wrpz1jP19zoj"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# NODE_OPTIONS disables Node 22+ experimental type stripping (ERR_UNSUPPORTED_NODE_MODULES_TYPE_STRIPPING)
# tsx replaces ts-mocha for Node 24+ compatibility (avoids "Unexpected token" with ts-node)
# setup-report.ts patches Mocha when REPORT=1 to generate reports/report-*.md
test = "NODE_OPTIONS='--no-experimental-strip-types' npx mocha --reporter spec --require tsx/cjs --require tests/setup-report.ts --timeout 120000 'tests/*.test.ts'"
